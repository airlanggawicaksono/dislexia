name: dyslexia
description: "A dyslexia support app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Local storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5

  # DI
  get_it: ^8.0.2

  # Functional programming
  fpdart: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Networking (kept for future use)
  dio: ^5.7.0

  # Localization
  easy_localization: ^3.0.7

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  stream_transform: ^2.1.1

  # Utils
  uuid: ^4.5.1
  logger: ^2.5.0

  # Feature: Upload / Scan / Lens
  file_picker: ^8.1.2
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  camerawesome: ^2.0.0
  flutter_scalable_ocr: ^2.2.1
  syncfusion_flutter_pdf: ^33.2.13
  archive: ^3.6.1
  provider: ^6.1.5+1
  flutter_dropzone: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/OpenDyslexic-Italic.otf
          style: italic

    - family: SassoonPrimary
      fonts:
        - asset: assets/fonts/Sassoon Primary Regular.otf

    - family: Tahoma
      fonts:
        - asset: assets/fonts/tahoma.ttf

    - family: WeezerFont
      fonts:
        - asset: assets/fonts/weezerfont.ttf
