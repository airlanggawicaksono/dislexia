name: dyslexia
description: "A dyslexia support app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # yolo
  ultralytics_yolo: ^0.1.26

  # State management
  flutter_bloc: ^9.0.0
  hydrated_bloc: ^10.0.0
  equatable: ^2.0.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4

  # DI
  get_it: ^8.0.2

  # Functional programming
  fpdart: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Networking (kept for future use)
  dio: ^5.7.0

  # Localization
  easy_localization: ^3.0.7

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  logger: ^2.5.0

  # Feature: Upload / Scan / Lens
  file_picker: ^8.1.2
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  camerawesome: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/fonts/

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/OpenDyslexic-Italic.otf
          style: italic
