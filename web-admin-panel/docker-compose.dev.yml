# Dev docker-compose for admin panel
# Usage: docker compose -f docker-compose.dev.yml up
# All values come from .env via ${VAR} substitution.

services:
  admin-panel:
    image: dev-dyslexia-admin:latest
    container_name: dev-admin-panel
    ports:
      - "${ADMIN_PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://dev-api.dyslexic.app}
      NEXT_PUBLIC_ADMIN_USERNAME: ${NEXT_PUBLIC_ADMIN_USERNAME}
      NEXT_PUBLIC_ADMIN_PASSWORD: ${NEXT_PUBLIC_ADMIN_PASSWORD}
    restart: always
    networks:
      - dislexia_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dislexia_network:
    name: dev_dislexia_network
    external: true
