name: Deploy Web Admin Panel

on:
  push:
    paths:
      - 'web-admin-panel/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -t dyslexia-admin:latest ./web-admin-panel

      - name: Save image as tar
        run: |
          docker save dyslexia-admin:latest -o /tmp/dyslexia-admin.tar
          ls -la /tmp/dyslexia-admin.tar

      - name: Copy image to VPS via SCP
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/dyslexia-admin.tar ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/dyslexia-admin.tar

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e

            echo '=== Deploying admin panel on VPS ==='

            echo '=== Load image ==='
            docker load -i /tmp/dyslexia-admin.tar

            echo '=== Stop old container ==='
            docker stop prod-admin-panel 2>/dev/null || true
            docker rm prod-admin-panel 2>/dev/null || true

            echo '=== Start container ==='
            docker run -d --name prod-admin-panel --restart unless-stopped \
              -p ${ADMIN_PORT:-3000}:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.dyslexic.app} \
              -e NEXT_PUBLIC_ADMIN_USERNAME=${NEXT_PUBLIC_ADMIN_USERNAME} \
              -e NEXT_PUBLIC_ADMIN_PASSWORD=${NEXT_PUBLIC_ADMIN_PASSWORD} \
              --network prod_dislexia_network \
              dyslexia-admin:latest

            echo '=== Cleanup ==='
            rm -f /tmp/dyslexia-admin.tar
            docker image prune -f

            echo '=== Done ==='
            docker ps | grep admin-panel
          "

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            sleep 5
            curl -f http://127.0.0.1:${ADMIN_PORT:-3000}/ || exit 1
            echo '=== Admin panel deployed successfully ==='
          "

      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment failed! Check VPS at ${{ secrets.VPS_HOST }}"
