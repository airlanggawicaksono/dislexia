name: Deploy Dev Admin Panel

on:
  push:
    paths:
      - 'web-admin-panel/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: DEV-ENV

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t dev-dyslexia-admin:latest ./web-admin-panel

      - name: Generate .env
        env:
          NEXT_PUBLIC_ADMIN_USERNAME: ${{ secrets.NEXT_PUBLIC_ADMIN_USERNAME }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
        run: |
          {
            echo "NODE_ENV=${{ vars.NODE_ENV }}"
            echo "PORT=${{ vars.PORT }}"
            echo "ADMIN_PORT=${{ vars.ADMIN_PORT }}"
            echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"
            esc() { printf '%s' "$1" | sed 's/\$/$$/g'; }
            printf "NEXT_PUBLIC_ADMIN_USERNAME=%s\n" "$(esc "$NEXT_PUBLIC_ADMIN_USERNAME")"
            printf "NEXT_PUBLIC_ADMIN_PASSWORD=%s\n" "$(esc "$NEXT_PUBLIC_ADMIN_PASSWORD")"
          } > /tmp/dev-admin.env

      - name: Save artifacts
        run: |
          docker save dev-dyslexia-admin:latest -o /tmp/dev-dyslexia-admin.tar
          cp ./web-admin-panel/docker-compose.dev.yml /tmp/docker-compose.dev.yml

      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key

      - name: Copy to VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/dev-dyslexia-admin.tar ${VPS}:/tmp/
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/docker-compose.dev.yml ${VPS}:/tmp/
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/dev-admin.env ${VPS}:/tmp/

      - name: Deploy on VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          KEY="/tmp/vps_key"

          ssh -o StrictHostKeyChecking=no -i ${KEY} ${VPS} "
            # Create deploy directory and drop .env + compose file into place
            mkdir -p /opt/dislexia/dev-admin
            cp /tmp/dev-admin.env /opt/dislexia/dev-admin/.env
            cp /tmp/docker-compose.dev.yml /opt/dislexia/dev-admin/

            # Deploy
            cd /opt/dislexia/dev-admin
            docker load -i /tmp/dev-dyslexia-admin.tar
            docker compose -f docker-compose.dev.yml down 2>/dev/null || true
            docker compose -f docker-compose.dev.yml up -d --no-build
          "

      - name: Health check
        run: |
          sleep 10
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${VPS} '
            docker ps
            docker compose -f /opt/dislexia/dev-admin/docker-compose.dev.yml logs --tail=30
            curl -f http://127.0.0.1:3000/ || echo "Health check failed"
          '

      - name: Notify failure
        if: failure()
        run: echo "Dev admin panel deployment failed! Check ${{ secrets.VPS_HOST }}:3000"
