name: Deploy BE

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - prod
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t dyslexia-be:latest ./backend

      - name: Save artifacts
        run: |
          docker save dyslexia-be:latest -o /tmp/dyslexia-be.tar
          cp ./backend/docker-compose.prod.yml /tmp/docker-compose.prod.yml

      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key

      - name: Copy to VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/dyslexia-be.tar ${VPS}:/tmp/
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/docker-compose.prod.yml ${VPS}:/tmp/

      - name: Backup DB before deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            docker exec prod-postgres pg_dump -U db-prod-dysliexic dyslexic_prod > /opt/dislexia/backups/predeploy.sql 2>/dev/null && echo 'DB backed up' || echo 'DB backup skipped'
          "

      - name: Deploy on VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          KEY="/tmp/vps_key"
          
          ssh -o StrictHostKeyChecking=no -i ${KEY} ${VPS} "
            # Write .env file
            printf 'POSTGRES_IMAGE=postgres:alpine3.23\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nDB_HOST=postgres-db\nDB_PORT=5432\nPOSTGRES_EXTERNAL_PORT=5432\nAPP_PORT=8000\nAPP_EXTERNAL_PORT=8001\nAPP_HOST=0.0.0.0\nJWT_SECRET_KEY=%s\nJWT_ALGORITHM=HS256\nJWT_ACCESS_TOKEN_EXPIRE_MINUTES=30\nENVIRONMENT=production\nDOCKER_IMAGE=dyslexia-be:latest\nSWAGGER_DOCS_ENABLED=true\nSWAGGER_USERNAME=%s\nSWAGGER_PASSWORD=%s\n' '${{ secrets.DB_USER }}' '${{ secrets.DB_PASSWORD }}' '${{ secrets.DB_NAME }}' '${{ secrets.JWT_SECRET_KEY }}' '${{ secrets.SWAGGER_USERNAME }}' '${{ secrets.SWAGGER_PASSWORD }}' > /opt/dislexia/prod/.env

            # Copy compose file
            cp /tmp/docker-compose.prod.yml /opt/dislexia/prod/

            # Deploy (no -v flag — would delete volumes!)
            cd /opt/dislexia/prod
            docker load -i /tmp/dyslexia-be.tar
            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d
          "

      - name: Run DB migrations
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo 'Running migrations...'
            docker exec -w /app prod-backend alembic upgrade head 2>&1 && echo 'Migration OK' || { docker exec -w /app prod-backend alembic stamp head 2>&1 && echo 'Migration stamped (table already exists)'; }
          "

      - name: Health check
        run: |
          sleep 10
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${VPS} '
            docker ps
            docker compose -f /opt/dislexia/prod/docker-compose.prod.yml logs --tail=30
            curl -f http://127.0.0.1:8001/health || echo "Health check failed"
          '

      - name: Notify failure
        if: failure()
        run: echo "Deployment failed! Check ${{ secrets.VPS_HOST }}:8001"
