name: Deploy BE Dev

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: DEV-ENV

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t dyslexia-dev:latest ./backend

      - name: Generate .env
        # Variables (${{ vars.* }}) are non-sensitive and inlined directly.
        # Secrets (${{ secrets.* }}) are loaded as env vars first, then written
        # with printf "%s" to prevent bash from interpreting special chars (e.g. $ in bcrypt hashes).
        # Model names are not in GitHub vars — hardcoded here as they are non-sensitive.
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SEED_ADMIN_USERNAME: ${{ secrets.SEED_ADMIN_USERNAME }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SWAGGER_USERNAME: ${{ secrets.SWAGGER_USERNAME }}
          SWAGGER_PASSWORD: ${{ secrets.SWAGGER_PASSWORD }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: |
          {
            echo "POSTGRES_IMAGE=postgres:16-alpine"
            echo "ENVIRONMENT=${{ vars.ENVIRONMENT }}"
            echo "APP_HOST=${{ vars.APP_HOST }}"
            echo "APP_PORT=${{ vars.APP_PORT }}"
            echo "APP_EXTERNAL_PORT=${{ vars.APP_PORT }}"
            echo "APP_WORKERS=${{ vars.APP_WORKERS }}"
            echo "APP_RELOAD=${{ vars.APP_RELOAD }}"
            echo "DB_HOST=${{ vars.DB_HOST }}"
            echo "DB_PORT=${{ vars.DB_PORT }}"
            echo "POSTGRES_EXTERNAL_PORT=${{ vars.DB_PORT }}"
            echo "DB_ECHO=${{ vars.DB_ECHO }}"
            echo "DB_POOL_SIZE=${{ vars.DB_POOL_SIZE }}"
            echo "DB_MAX_OVERFLOW=${{ vars.DB_MAX_OVERFLOW }}"
            echo "JWT_ALGORITHM=${{ vars.JWT_ALGORITHM }}"
            echo "JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${{ vars.JWT_ACCESS_TOKEN_EXPIRE_MINUTES }}"
            echo "SWAGGER_DOCS_ENABLED=${{ vars.SWAGGER_DOCS_ENABLED }}"
            echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER }}"
            echo "TOGETHER_MODEL=deepseek-ai/DeepSeek-V4-Pro"
            echo "OPENAI_MODEL=gpt-4o-mini"
            echo "ANTHROPIC_MODEL=claude-haiku-4-5-20251001"
            echo "OPENAI_API_KEY="
            echo "ANTHROPIC_API_KEY="
            # docker-compose recursively interprets values from .env when
            # substituting ${VAR}. To pass literal '$' (e.g. bcrypt hashes),
            # we escape every '$' to '$$'. After substitution compose
            # collapses '$$' → '$' so the container receives the real value.
            esc() { printf '%s' "$1" | sed 's/\$/$$/g'; }
            printf "DB_USER=%s\n"             "$(esc "$DB_USER")"
            printf "DB_PASSWORD=%s\n"         "$(esc "$DB_PASSWORD")"
            printf "DB_NAME=%s\n"             "$(esc "$DB_NAME")"
            printf "JWT_SECRET_KEY=%s\n"      "$(esc "$JWT_SECRET_KEY")"
            printf "SEED_ADMIN_USERNAME=%s\n" "$(esc "$SEED_ADMIN_USERNAME")"
            printf "SEED_ADMIN_PASSWORD=%s\n" "$(esc "$SEED_ADMIN_PASSWORD")"
            printf "SWAGGER_USERNAME=%s\n"    "$(esc "$SWAGGER_USERNAME")"
            printf "SWAGGER_PASSWORD=%s\n"    "$(esc "$SWAGGER_PASSWORD")"
            printf "TOGETHER_API_KEY=%s\n"    "$(esc "$TOGETHER_API_KEY")"
          } > /tmp/dev.env

      - name: Save artifacts
        run: |
          docker save dyslexia-dev:latest -o /tmp/dyslexia-dev.tar
          cp ./backend/docker-compose.dev.yml /tmp/docker-compose.dev.yml

      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key

      - name: Copy to VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/dyslexia-dev.tar      ${VPS}:/tmp/
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/docker-compose.dev.yml ${VPS}:/tmp/
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key /tmp/dev.env                ${VPS}:/tmp/

      - name: Backup DB before deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            docker exec dev-postgres pg_dump -U dev dev > /opt/dislexia/backups/predeploy-dev.sql 2>/dev/null && echo 'DB backed up' || echo 'DB backup skipped'
          "

      - name: Deploy on VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          KEY="/tmp/vps_key"

          ssh -o StrictHostKeyChecking=no -i ${KEY} ${VPS} "
            # Drop .env and compose file into place
            cp /tmp/dev.env /opt/dislexia/dev/.env
            cp /tmp/docker-compose.dev.yml /opt/dislexia/dev/

            # Deploy (no -v flag — would delete volumes!)
            cd /opt/dislexia/dev
            docker load -i /tmp/dyslexia-dev.tar
            docker tag dyslexia-dev:latest dev-fastapi-app:latest
            docker compose -f docker-compose.dev.yml down 2>/dev/null || true
            docker compose -f docker-compose.dev.yml up -d --no-build
          "

      - name: Run DB migrations
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo 'Running migrations...'
            docker exec -w /app dev-backend alembic upgrade head 2>&1 && echo 'Migration OK' || { docker exec -w /app dev-backend alembic stamp head 2>&1 && echo 'Migration stamped (table already exists)'; }
          "

      - name: Health check
        run: |
          sleep 10
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key ${VPS} '
            docker ps
            docker compose -f /opt/dislexia/dev/docker-compose.dev.yml logs --tail=30
            curl -f http://127.0.0.1:8000/health || echo "Health check failed"
          '

      - name: Notify failure
        if: failure()
        run: echo "Dev deployment failed! Check ${{ secrets.VPS_HOST }}:8000"
