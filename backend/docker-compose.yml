services:
  postgres-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: dislexia-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:${DB_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dislexia_network

  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-8000}
    container_name: dislexia-app
    command: >
      sh -c "uvicorn app.main:app
      --host ${APP_HOST:-0.0.0.0}
      --port ${APP_PORT:-8000}
      $$([ '${APP_RELOAD}' = 'true' ] && echo '--reload' || echo '')"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    ports:
      - "${APP_EXTERNAL_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - dislexia_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  dislexia_network:
    driver: bridge
