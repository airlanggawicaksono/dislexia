# Standalone dev compose file - do NOT use with docker-compose.yml
# Usage: docker compose -f docker-compose.dev.yml up
# All values are read from the sibling .env file — no hardcoded values here.

services:
  fastapi-app:
    image: dev-fastapi-app:latest
    container_name: dev-backend
    volumes: []
    ports:
      - "${APP_EXTERNAL_PORT}:${APP_PORT}"
    environment:
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      APP_WORKERS: ${APP_WORKERS}
      APP_RELOAD: ${APP_RELOAD}
      ENVIRONMENT: ${ENVIRONMENT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_ECHO: ${DB_ECHO}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SWAGGER_DOCS_ENABLED: ${SWAGGER_DOCS_ENABLED}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      LLM_PROVIDER: ${LLM_PROVIDER}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
      TOGETHER_MODEL: ${TOGETHER_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
    depends_on:
      postgres-db:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app
      --host ${APP_HOST}
      --port ${APP_PORT}
      --reload"
    networks:
      - dislexia_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:${APP_PORT}/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres-db:
    image: ${POSTGRES_IMAGE}
    container_name: dev-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-dev-data:/var/lib/postgresql
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${DB_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dislexia_network
    restart: always

networks:
  dislexia_network:
    name: dev_dislexia_network
    driver: bridge

volumes:
  postgres-dev-data:
    name: dev_postgres-dev-data
    driver: local
